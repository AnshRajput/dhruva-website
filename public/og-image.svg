  <!-- pole-star mark, scaled 6x from the 64x64 geometry, centered left -->
  <g transform="translate(180,195) scale(6)">
    <path
      d="M27,32 Q30.03,20.95 32,4 Q33.97,20.95 37,32 L27,32 Z M37,32 Q33.97,43.05 32,60 Q30.03,43.05 27,32 Z M32,27 Q42.05,30.07 58,32 Q42.05,33.93 32,37 Z M32,37 Q21.95,33.93 6,32 Q21.95,30.07 32,27 Z"
