  </g>

  <text x="440" y="300" font-family="Georgia, 'Times New Roman', serif" font-size="72" font-weight="600" fill="#EDEFF8">
    Dhruva AI
  </text>
  <text x="440" y="360" font-family="Georgia, 'Times New Roman', serif" font-size="34" font-weight="600" fill="#EBBA47">
