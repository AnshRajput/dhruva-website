<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- Static OG/social-preview image. Colors are dark-theme tokens.json values
       (color.dark.background #0E1220, color.brand.starGold.400 #EBBA47,
       color.dark.onBackground #EDEFF8, color.dark.onSurfaceVariant #C7CEE0)
       hand-copied here since a static asset can't consume tokens.css. -->
